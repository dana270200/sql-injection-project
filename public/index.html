<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Hapoalim - Secure Login Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Header Styling --- */
        header {
            background-color: #ffffff;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10%;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
            color: #333;
            font-size: 14px;
        }

        .nav-link {
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 20px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nav-link:hover {
            background-color: #f4f4f4;
            color: #d91c24;
        }

        .logo-img {
            height: 40px;
        }

        /* --- Main Content Area --- */
        main {
            flex: 1;
            position: relative;
            background-image: url('background.png');
            background-size: cover; 
            background-position: center 20%; 
            background-repeat: no-repeat;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding-left: 10%;
        }

        .login-card {
            background-color: #ffffff;
            width: 380px;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            margin-top: -50px;
        }

        .login-card h2 {
            font-size: 24px;
            color: #444;
            font-weight: 600;
            margin-bottom: 25px;
        }

        /* --- Error Message Styling (English / LTR) --- */
        .error-message {
            display: none;
            background-color: #fff5f5;
            color: #c53030;
            border: 1px solid #fed7d7;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: left;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #333;
            margin-bottom: 5px;
            font-weight: 400;
        }

        .input-wrapper input {
            width: 100%;
            height: 40px;
            background-color: #eef3fb;
            border: 1px solid #d1d9e6;
            border-radius: 4px;
            padding: 0 12px;
            font-size: 14px;
            color: #333;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: #8bb4e7;
        }

        .forgot-link {
            display: block;
            font-size: 13px;
            color: #666;
            text-decoration: underline;
            margin-bottom: 30px;
            cursor: pointer;
            text-align: center;
        }

        .login-btn {
            width: 150px;
            height: 44px;
            background: linear-gradient(to bottom, #d91c24, #b01017);
            color: white;
            border: none;
            border-radius: 22px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(217, 28, 36, 0.3);
        }

        .login-btn:hover {
            background: linear-gradient(to bottom, #e3252d, #bd151c);
        }

    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <img src="logo.png" alt="Bank Hapoalim" class="logo-img" onerror="this.style.display='none'">
        </div>
        <div class="header-right">
            <span class="nav-link">⚙️ Support</span>
            <span class="nav-link">📍 Terms and conditions</span>
        </div>
    </header>

    <main>
        <div class="login-card">
            <h2>Login</h2>
            
            <div id="login-error" class="error-message">
                <strong>Login Failed</strong><br>
                The ID number or password you entered is incorrect.
            </div>
            
            <form action="/login-vulnerable" method="POST">
                <div class="input-group">
                    <label>ID Number</label>
                    <div class="input-wrapper">
                        <input type="text" name="id_number" value="123456789" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" name="password" value="••••••••" required>
                    </div>
                </div>

                <a class="forgot-link">Forgot ID / Password</a>

                <button type="submit" class="login-btn">Login</button>
            </form>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('error') === '1') {
                document.getElementById('login-error').style.display = 'block';
            }
        });
    </script>
</body>
</html>
